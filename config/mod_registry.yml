      - player.mp
      description: 战斗结束获得神圣祈福
- mod_id: vampire_mod
  name: 吸血鬼大修
  enabled: true
  priority: 100
  conflict_strategy: smart_merge
  allowed_fields: []
  hooks_manifest:
    vampire_lifesteal:
      trigger: on_combat_end
      write_access:
      - player.hp
      description: 战斗结束吸取血液恢复生命
